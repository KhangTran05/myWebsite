<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khang Tran | Workspace</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
            background-color: #0f172a; color: #f8fafc; 
        }
        .container { 
            text-align: center; padding: 40px; 
            background: #1e293b; border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3); 
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 1.1em; line-height: 1.5; }
        .btn { 
            display: inline-block; margin-top: 20px; padding: 12px 24px; 
            background-color: #38bdf8; color: #0f172a; 
            text-decoration: none; border-radius: 6px; font-weight: bold; 
            transition: 0.3s; border: none; cursor: pointer;
        }
        .btn:hover { background-color: #0ea5e9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Khang Tran Space</h1>
        <p>Hệ thống đang trong quá trình xây dựng và cấu hình.<br>Sẽ sớm ra mắt những dự án mới!</p>
        <button class="btn" onclick="alert('Kết nối thành công! Tên miền đã hoạt động.')">Kiểm tra hệ thống</button>
    </div>
</body>
</html>
